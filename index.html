<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R. Zhou — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a12;
  font-family: 'Space Grotesk', sans-serif;
  color: #e8e8f0;
  overflow: hidden;
}
.container {
  text-align: center;
  padding: 40px 24px;
}
h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(10px, 1.5vw, 13px);
  color: #00d4aa;
  letter-spacing: 0.15em;
  margin-bottom: 48px;
  opacity: 0.8;
}
.modes {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}
.mode-card {
  width: 260px;
  padding: 32px 24px;
  border-radius: 16px;
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}
.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--accent), transparent 60%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}
.mode-card:hover {
  transform: translateY(-4px) scale(1.02);
}
.dark-mode {
  background: rgba(10,10,18,0.8);
  --accent: #00d4aa;
}
.dark-mode:hover { box-shadow: 0 8px 40px rgba(0,212,170,0.15); }
.light-mode {
  background: rgba(244,241,235,0.08);
  --accent: #c4a44a;
}
.light-mode:hover { box-shadow: 0 8px 40px rgba(196,164,74,0.15); }
.mode-icon {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}
.mode-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}
.mode-desc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #8a8a9a;
  letter-spacing: 0.05em;
  line-height: 1.6;
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: #00d4aa;
  opacity: 0;
  animation: float 8s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { opacity: 0; transform: translateY(0); }
  50% { opacity: 0.3; transform: translateY(-40px); }
}
</style>
</head>
<body>
<div class="container">
  <h1>RAUL ZHOU</h1>
  <div class="subtitle">SELECT MICROSCOPE MODE</div>
  <div class="modes">
    <a href="v6-microscope.html" class="mode-card dark-mode">
      <span class="mode-icon">🔬</span>
      <div class="mode-title">Darkfield</div>
      <div class="mode-desc">Fluorescence microscopy<br>Light on dark</div>
    </a>
    <a href="v6-microscope-light.html" class="mode-card light-mode">
      <span class="mode-icon">🔭</span>
      <div class="mode-title">Brightfield</div>
      <div class="mode-desc">Optical microscopy<br>Dark on light</div>
    </a>
  </div>
</div>

<script>
// Ambient particles
for (var i = 0; i < 20; i++) {
  var p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (6 + Math.random() * 4) + 's';
  document.body.appendChild(p);
}
</script>
</body>
</html>
