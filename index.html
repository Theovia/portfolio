<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>R. Zhou — Specimen Analysis</title>
<meta name="description" content="Portfolio of Raul Zhou — AI-native engineer building production systems solo. View through the microscope.">
<meta property="og:title" content="Raul Zhou — One engineer. Production systems. AI-native.">
<meta property="og:description" content="Interactive microscope portfolio. Zoom from macro to quantum to explore production systems built by one developer.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://theovia.github.io/portfolio/">
<meta property="og:image" content="https://theovia.github.io/portfolio/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Raul Zhou — One engineer. Production systems. AI-native.">
<meta name="twitter:description" content="Interactive microscope portfolio. Zoom from macro to quantum.">
<meta name="twitter:image" content="https://theovia.github.io/portfolio/og-image.png">
<meta name="theme-color" content="#060610">
<link rel="icon" type="image/svg+xml" href="/portfolio/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading-screen">
    <div class="focus-rings">
      <div class="focus-ring"></div>
      <div class="focus-ring"></div>
      <div class="focus-ring"></div>
      <div class="focus-ring"></div>
    </div>
    <div id="loading-text">FOCUSING...</div>
  </div>

  <svg id="cursor-svg" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#c4a44a" stroke-width="0.5" opacity="0.5"/>
    <circle cx="20" cy="20" r="1.5" fill="#c4a44a" opacity="0.8"/>
    <line x1="20" y1="2" x2="20" y2="12" stroke="#c4a44a" stroke-width="0.7" opacity="0.6"/>
    <line x1="20" y1="28" x2="20" y2="38" stroke="#c4a44a" stroke-width="0.7" opacity="0.6"/>
    <line x1="2" y1="20" x2="12" y2="20" stroke="#c4a44a" stroke-width="0.7" opacity="0.6"/>
    <line x1="28" y1="20" x2="38" y2="20" stroke="#c4a44a" stroke-width="0.7" opacity="0.6"/>
  </svg>

  <canvas id="bio-canvas"></canvas>
  <canvas id="gl-canvas"></canvas>

  <div id="vignette"></div>
  <div id="transition-flash"></div>

  <div id="ui-layer">
    <div id="toolbar">
      <button class="toolbar-btn" id="theme-btn" title="Toggle Illumination">&#x1f52c;</button>
      <button class="toolbar-btn muted" id="sound-btn" title="Toggle Sound">&#x1f507;</button>
      <button class="toolbar-btn" id="screenshot-btn" title="Screenshot">&#x1f4f7;</button>
    </div>

    <div id="channel-bar">
      <span class="channel-label">CHANNELS</span>
      <button class="channel-btn active" id="ch-dapi" title="DAPI (405nm) — DNA/Nuclei" data-channel="dapi">
        <span class="ch-dot dapi"></span>DAPI
      </button>
      <button class="channel-btn active" id="ch-gfp" title="GFP (488nm) — Proteins" data-channel="gfp">
        <span class="ch-dot gfp"></span>GFP
      </button>
      <button class="channel-btn active" id="ch-tritc" title="TRITC (561nm) — Membranes" data-channel="tritc">
        <span class="ch-dot tritc"></span>TRITC
      </button>
      <button class="channel-btn" id="ch-bf" title="Brightfield — Transmitted Light" data-channel="bf">
        <span class="ch-dot bf"></span>BF
      </button>
    </div>

    <div id="quality-badge"></div>

    <div id="mag-display">
      <span class="mag-label">OBJECTIVE</span>
      <span id="mag-value">4x</span>
      <div id="mag-bar"><div id="mag-bar-fill"></div></div>
    </div>

    <div id="scale-bar">
      <span id="scale-text">500 &mu;m</span>
      <div id="scale-line"></div>
    </div>

    <div id="specimen-label">
      SPECIMEN: R. ZHOU<br>
      <em>Homo sapiens artificialis</em><br>
      <span class="slide-info">STAINING: Anti-GFP (488nm) / DAPI / Phalloidin-TRITC</span><br>
      <span class="slide-info">SLIDE 001 &mdash; PREPARED 2026</span>
    </div>

    <div id="zoom-steps"></div>
    <div id="nav-hint">SCROLL TO ZOOM IN</div>
  </div>

  <div id="detail-panel">
    <button id="detail-close">&times;</button>
    <div id="detail-title"></div>
    <div id="detail-subtitle"></div>
    <div id="detail-metrics"></div>
    <div id="detail-body"></div>
    <div id="detail-stack"></div>
    <button id="detail-deepdive" style="display:none">DEEP DIVE &rarr;</button>
  </div>

  <div id="case-study-overlay" style="display:none">
    <button id="case-study-close">&larr; BACK TO SPECIMEN</button>
    <div id="case-study-content"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
