*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --gold-lt:#c4a44a;
  --orange:#c44d2a;
  --text:#4a453e;
  --text-muted:#8a8078;
  --glass:rgba(250,247,242,0.88);
  --glass-border:rgba(154,116,32,0.18);
  --shadow:rgba(74,69,62,0.08);
  --panel-w:340px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;cursor:none}
/* ── CANVAS ── */
#canvas-bg{position:fixed;inset:0;z-index:0}
/* ── CURSOR ── */
#cur-dot{position:fixed;width:5px;height:5px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .08s}
#cur-ring{position:fixed;width:34px;height:34px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;opacity:.7}
/* ── WATERMARK ── */
#wm{position:fixed;font-family:'Syne',sans-serif;font-size:clamp(160px,26vw,360px);font-weight:800;color:var(--gold);opacity:.035;pointer-events:none;z-index:1;left:50%;top:50%;transform:translate(-50%,-50%);user-select:none;will-change:transform;letter-spacing:-.02em}
/* ── NAVBAR ── */
#nav{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:100;background:rgba(245,242,237,.75);backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--gold);letter-spacing:.04em}
.nav-links{display:flex;gap:8px}
.nav-btn{background:none;border:1px solid var(--glass-border);color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:6px 14px;border-radius:4px;cursor:none;transition:all .2s;letter-spacing:.08em;text-transform:uppercase}
.nav-btn:hover,.nav-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(154,116,32,.07)}
.nav-right{display:flex;align-items:center;gap:16px}
#clock{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-muted);letter-spacing:.05em;min-width:72px;text-align:right}
#lang-btn{background:none;border:1px solid var(--gold);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:5px 11px;border-radius:4px;cursor:none;transition:all .2s;letter-spacing:.1em}
#lang-btn:hover{background:var(--gold);color:#fff}
/* ── CAROUSEL ── */
#car-area{position:fixed;inset:0;z-index:10;pointer-events:none}
#car-track{position:absolute;pointer-events:none;transition:transform .6s cubic-bezier(.4,0,.2,1);will-change:transform}
.c-dot{position:absolute;width:0;height:0;pointer-events:none;transition:opacity .45s,transform .5s cubic-bezier(.4,0,.2,1)}
.c-dot-inner{position:absolute;top:0;left:0;transform:translate(-50%,-50%);border-radius:50%;background:var(--gold);transition:width .4s,height .4s,background .3s;pointer-events:all;cursor:none;box-shadow:0 0 0 0 rgba(154,116,32,.4)}
.c-dot.active .c-dot-inner{background:var(--gold);box-shadow:0 0 16px rgba(154,116,32,.35)}
.c-dot-label{position:absolute;top:0;left:0;transform:translate(-50%,calc(-50% - 22px));font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--gold);white-space:nowrap;opacity:0;transition:opacity .25s;letter-spacing:.06em;pointer-events:none}
.c-dot:hover .c-dot-label{opacity:1}
.c-dot.active .c-dot-label{opacity:.7}
/* Ripple */
.rpl{position:absolute;top:0;left:0;border-radius:50%;border:1.5px solid var(--gold);pointer-events:none;opacity:0}
.c-dot.active .rpl:nth-child(1){animation:rpl 2.4s ease-out infinite}
.c-dot.active .rpl:nth-child(2){animation:rpl 2.4s ease-out .8s infinite}
.c-dot.active .rpl:nth-child(3){animation:rpl 2.4s ease-out 1.6s infinite}
@keyframes rpl{
  0%{transform:translate(-50%,-50%) scale(.4);opacity:.75}
  100%{transform:translate(-50%,-50%) scale(3.2);opacity:0}
}
/* ── HEX BUTTONS ── */
.hex-btn{position:fixed;width:46px;height:52px;background:rgba(245,242,237,.92);border:none;color:var(--gold);font-size:1.1rem;cursor:none;z-index:20;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;transition:all .2s;filter:drop-shadow(0 1px 3px rgba(154,116,32,.25))}
.hex-btn:hover{background:rgba(154,116,32,.12);filter:drop-shadow(0 2px 8px rgba(154,116,32,.4))}

#btn-nxt{bottom:94px;left:calc(38vw + 32px)}
/* ── PIPS ── */

.pip{width:6px;height:6px;border-radius:50%;background:rgba(154,116,32,.25);transition:all .3s;cursor:none}
.pip.on{background:var(--gold);width:22px;border-radius:3px}

.p-company{font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--gold);margin-bottom:4px}
.p-date{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text-muted);margin-bottom:16px}
.p-desc{font-size:.86rem;line-height:1.65;color:var(--text);margin-bottom:18px}
.p-tech{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.t-tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--gold);border:1px solid rgba(154,116,32,.28);padding:3px 8px;border-radius:3px;background:rgba(154,116,32,.06)}

.p-idx{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text-muted);margin-bottom:20px;letter-spacing:.08em}
/* ── SIDE PANELS ── */

#about-p.open{transform:translateX(0)}
#contact-p{right:0;border-left:1px solid var(--glass-border);transform:translateX(100%)}

.side-panel h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--text);margin-bottom:22px}
.sp-close{position:absolute;top:18px;right:18px;background:none;border:1px solid var(--glass-border);color:var(--text-muted);font-size:.9rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;transition:all .2s}

.sp-intro{font-size:.87rem;line-height:1.7;color:var(--text);margin-bottom:22px}
.sp-details{list-style:none;margin-bottom:26px}

.m-ul li::before{content:'▸';position:absolute;left:0;color:var(--gold)}

#pov.on{display:block}
/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── MOBILE ── */
@media(max-width:768px){

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){

}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:2px}
</style>
</head>

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let idx = 0;
let lang = 'en';
const N = DATA.entries.length;
// Diagonal step (going up-right)
const DX = 72, DY = -60;

// ════════════════════════════════════════
// PARTICLE SYSTEM
// ════════════════════════════════════════
const cvs = document.getElementById('canvas-bg');
const ctx2 = cvs.getContext('2d');
let ptcls = [];
let mx = -2000, my = -2000;
let raf;

// Colors: [r,g,b]
const PCOLS = [
  [154,116,32], // gold
  [180,142,48],
  [196,164,74],
  [212,184,110],
  [230,210,155],
  [242,232,200],
  [196, 77, 42], // rare orange
];

// Constellation attractor sets [x,y] normalized 0-1
const CONS = [
  // 0 Helix
  [[.12,.18],[.22,.36],[.32,.54],[.42,.72],[.52,.88],[.16,.30],[.26,.48],[.36,.66],[.46,.84],[.5,.2]],
  // 1 Neural net
  [[.1,.12],[.5,.08],[.88,.12],[.28,.42],[.72,.42],[.1,.78],[.5,.84],[.88,.78],[.5,.5],[.3,.65]],
  // 2 Medical cross
  [[.5,.08],[.5,.35],[.5,.65],[.5,.88],[.1,.5],[.32,.5],[.68,.5],[.9,.5],[.3,.28],[.7,.28]],
  // 3 Enterprise grid
  [[.15,.15],[.5,.15],[.85,.15],[.15,.5],[.5,.5],[.85,.5],[.15,.85],[.5,.85],[.85,.85],[.32,.32]],
  // 4 Star/Atlas
  [[.5,.1],[.85,.32],[.72,.75],[.28,.75],[.15,.32],[.5,.5],[.38,.22],[.62,.22],[.7,.55],[.3,.55]],
  // 5 Organic/leaf
  [[.28,.12],[.62,.18],[.82,.38],[.78,.65],[.5,.84],[.22,.65],[.18,.38],[.5,.5],[.42,.28],[.62,.42]],
];

function initPtcls(){
  ptcls=[];
  const w=cvs.width,h=cvs.height;
  for(let i=0;i<225;i++){
    const orange = Math.random()<.07;
    const ci = orange ? 6 : Math.floor(Math.random()*6);
    ptcls.push({
      x: Math.random()*w,
      y: Math.random()*h,
      vx:(Math.random()-.5)*.35,
      vy:(Math.random()-.5)*.35,
      sz: Math.random()*2.4+.7,
      col: PCOLS[ci],
      a: Math.random()*.38+.22,
      tx: Math.random()*w,
      ty: Math.random()*h,
      ks: Math.random()*.0009+.0003,
    });
  }
  setTargets(idx,false);
}

function setTargets(i,anim){
  const attrs=CONS[i];
  const w=cvs.width,h=cvs.height;
  const sp=Math.min(w,h)*.26;
  ptcls.forEach((p,j)=>{
    const a=attrs[j%attrs.length];
    p.tx=Math.max(10,Math.min(w-10, a[0]*w+(Math.random()-.5)*sp));
    p.ty=Math.max(10,Math.min(h-10, a[1]*h+(Math.random()-.5)*sp));
  });
}

function resizeCvs(){
  cvs.width=innerWidth;
  cvs.height=innerHeight;
  initPtcls();
}

function drawFrame(){
  const w=cvs.width,h=cvs.height;
  ctx2.clearRect(0,0,w,h);

  // Update
  for(let i=0;i<ptcls.length;i++){
    const p=ptcls[i];
    // Attract to target
    const ex=p.tx-p.x, ey=p.ty-p.y;
    p.vx+=ex*p.ks;
    p.vy+=ey*p.ks;
    // Mouse repel
    const rx=p.x-mx, ry=p.y-my;
    const rd2=rx*rx+ry*ry;
    if(rd2<14400&&rd2>0){ // 120^2
      const rd=Math.sqrt(rd2);
      const f=(120-rd)/120*.9;
      p.vx+=rx/rd*f;
      p.vy+=ry/rd*f;
    }
    // Damp
    p.vx*=.93;
    p.vy*=.93;
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.x<0){p.x=0;p.vx*=-.6}
    if(p.x>w){p.x=w;p.vx*=-.6}
    if(p.y<0){p.y=0;p.vy*=-.6}
    if(p.y>h){p.y=h;p.vy*=-.6}
  }

  // Connections (spatial optimization: only check nearby)
  const CD=135, CD2=CD*CD;
  ctx2.lineWidth=.6;
  for(let i=0;i<ptcls.length;i++){
    for(let j=i+1;j<ptcls.length;j++){
      const dx=ptcls[i].x-ptcls[j].x;
      const dy=ptcls[i].y-ptcls[j].y;
      if(Math.abs(dx)>CD||Math.abs(dy)>CD) continue;
      const d2=dx*dx+dy*dy;
      if(d2<CD2){
        const t=(1-Math.sqrt(d2)/CD)*.22;
        const [r,g,b]=ptcls[i].col;
        ctx2.strokeStyle=`rgba(${r},${g},${b},${t})`;
        ctx2.beginPath();
        ctx2.moveTo(ptcls[i].x,ptcls[i].y);
        ctx2.lineTo(ptcls[j].x,ptcls[j].y);
        ctx2.stroke();
      }
    }
  }

  // Draw particles
  for(let i=0;i<ptcls.length;i++){
    const p=ptcls[i];
    const [r,g,b]=p.col;
    // Glow
    if(p.sz>2){
      ctx2.beginPath();
      ctx2.arc(p.x,p.y,p.sz*2.2,0,Math.PI*2);
      ctx2.fillStyle=`rgba(${r},${g},${b},${p.a*.12})`;
      ctx2.fill();
    }
    ctx2.beginPath();
    ctx2.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx2.fillStyle=`rgba(${r},${g},${b},${p.a})`;
    ctx2.fill();
  }

  raf=requestAnimationFrame(drawFrame);
}

// ════════════════════════════════════════
// CAROUSEL
// ════════════════════════════════════════
function buildCarousel(){
  const track=document.getElementById('car-track');
  const pipsEl=document.getElementById('pips');
  track.innerHTML='';
  pipsEl.innerHTML='';

  DATA.entries.forEach((e,i)=>{
    // Dot
    const dot=document.createElement('div');
    dot.className='c-dot'+(i===idx?' active':'');
    dot.style.left=(i*DX)+'px';
    dot.style.top=(i*DY)+'px';

    // 3 ripple rings
    for(let r=0;r<3;r++){
      const rng=document.createElement('div');
      rng.className='rpl';
      rng.style.width=rng.style.height='44px';
      rng.style.transform='translate(-50%,-50%) scale(0)';
      dot.appendChild(rng);
    }

    // Inner dot
    const inner=document.createElement('div');
    inner.className='c-dot-inner';
    const sz=i===idx?24:18;
    inner.style.width=inner.style.height=sz+'px';
    dot.appendChild(inner);

    // Label
    const lbl=document.createElement('div');
    lbl.className='c-dot-label';
    lbl.textContent=e.date[lang].split('–')[0].trim();
    dot.appendChild(lbl);

    dot.addEventListener('click',()=>goTo(i));
    track.appendChild(dot);

    // Pip
    const pip=document.createElement('div');
    pip.className='pip'+(i===idx?' on':'');
    pip.addEventListener('click',()=>goTo(i));
    pipsEl.appendChild(pip);
  });

  posTrack();
}

function posTrack(){
  const track=document.getElementById('car-track');
  const ax=innerWidth*.38, ay=innerHeight*.52;
  const tx=ax-idx*DX;
  const ty=ay-idx*DY;
  track.style.transform=`translate(${tx}px,${ty}px)`;

  // Update each dot
  const dots=track.querySelectorAll('.c-dot');
  dots.forEach((d,i)=>{
    const dist=Math.abs(i-idx);
    d.classList.toggle('active',i===idx);
    let sc,op;
    if(dist===0){sc=1;op=1;}
    else if(dist===1){sc=.68;op=.5;}
    else if(dist===2){sc=.44;op=.22;}
    else{sc=.2;op=0;}
    d.style.opacity=op;
    d.style.transform=`translate(-50%,-50%) scale(${sc})`;
    const inner=d.querySelector('.c-dot-inner');
    if(inner){
      const sz=i===idx?24:18;
      inner.style.width=inner.style.height=sz+'px';
    }
    const lbl=d.querySelector('.c-dot-label');
    if(lbl) lbl.textContent=DATA.entries[i].date[lang].split('–')[0].trim();
  });

  // Pips
  document.querySelectorAll('.pip').forEach((p,i)=>p.classList.toggle('on',i===idx));

  updatePanel();
}

function goTo(i){
  if(i<0||i>=N) return;
  idx=i;
  setTargets(idx,true);
  posTrack();
}

function buildAbout(){
  const a=DATA.about;
  const intro=a[lang].intro;
  const dets=a[lang].details;
  let html=`<p class="sp-intro">${intro}</p><ul class="sp-details">`;
  dets.forEach(d=>{ html+=`<li>${d}</li>`; });
  html+=`</ul>`;
  html+=`<div style="font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;">Tech Stack</div>`;
  Object.entries(a.skills).forEach(([cat,tags])=>{
    html+=`<div class="sk-cat"><div class="sk-cat-lbl">${cat}</div><div class="sk-tags">${tags.map(t=>`<span class="sk-tag">${t}</span>`).join('')}</div></div>`;
  });
  document.getElementById('about-h').textContent=lang==='en'?'About':'Acerca de';
  document.getElementById('about-body').innerHTML=html;
}

function buildContact(){
  const c=DATA.contact[lang];
  let html='';
  c.items.forEach(it=>{
    html+=`<div class="ct-item"><div class="ct-lbl">${it.label}</div><div class="ct-val">${it.href?`<a href="${it.href}">${it.value}</a>`:it.value}</div></div>`;
  });
  html+=`<p class="ct-note">${c.note}</p>`;
  document.getElementById('contact-h').textContent=c.title;
  document.getElementById('contact-body').innerHTML=html;
}

function openPanel(which){
  const ap=document.getElementById('about-p');
  const cp=document.getElementById('contact-p');
  const pov=document.getElementById('pov');
  const ba=document.getElementById('btn-about');
  const bc=document.getElementById('btn-contact');
  if(which==='about'){
    const was=ap.classList.contains('open');
    cp.classList.remove('open'); bc.classList.remove('on');
    if(!was){ buildAbout(); ap.classList.add('open'); ba.classList.add('on'); pov.classList.add('on'); }
    else { ap.classList.remove('open'); ba.classList.remove('on'); pov.classList.remove('on'); }
  } else {
    const was=cp.classList.contains('open');
    ap.classList.remove('open'); ba.classList.remove('on');
    if(!was){ buildContact(); cp.classList.add('open'); bc.classList.add('on'); pov.classList.add('on'); }
    else { cp.classList.remove('open'); bc.classList.remove('on'); pov.classList.remove('on'); }
  }
}
function closeAll(){
  document.getElementById('about-p').classList.remove('open');
  document.getElementById('contact-p').classList.remove('open');
  document.getElementById('pov').classList.remove('on');
  document.getElementById('btn-about').classList.remove('on');
  document.getElementById('btn-contact').classList.remove('on');
}

function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}:${s}`;
}

// ════════════════════════════════════════
// CUSTOM CURSOR
// ════════════════════════════════════════
const cdot=document.getElementById('cur-dot');
const cring=document.getElementById('cur-ring');
let rx=0,ry=0,cx2=0,cy2=0;
function cursorLoop(){
  rx+=(cx2-rx)*.11;
  ry+=(cy2-ry)*.11;
  cring.style.left=rx+'px';
  cring.style.top=ry+'px';
  requestAnimationFrame(cursorLoop);
}

// ════════════════════════════════════════
// WATERMARK PARALLAX
// ════════════════════════════════════════
const wm=document.getElementById('wm');
function parallax(px,py){
  const dx=(px-innerWidth/2)/innerWidth*18;
  const dy=(py-innerHeight/2)/innerHeight*14;
  wm.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}

// ════════════════════════════════════════
// TOUCH SWIPE
// ════════════════════════════════════════
let tsx=0,tsy=0;
window.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  const ddx=e.changedTouches[0].clientX-tsx;
  const ddy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(ddx)>Math.abs(ddy)){
    if(Math.abs(ddx)>45){ ddx<0?goTo(idx+1):goTo(idx-1); }
  } else {
    if(Math.abs(ddy)>45){ ddy<0?goTo(idx+1):goTo(idx-1); }
  }
},{passive:true});

// ════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════
window.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cx2=e.clientX; cy2=e.clientY;
  cdot.style.left=e.clientX+'px';
  cdot.style.top=e.clientY+'px';
  parallax(e.clientX,e.clientY);
});

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();goTo(idx+1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();goTo(idx-1);}
  if(e.key==='Escape'){closeModal();closeAll();}
});

window.addEventListener('resize',()=>{
  resizeCvs();
  posTrack();
});

document.getElementById('btn-prv').addEventListener('click',()=>goTo(idx-1));
document.getElementById('btn-nxt').addEventListener('click',()=>goTo(idx+1));

document.getElementById('modal-ov').addEventListener('click',e=>{

});

      cring.style.width='46px';

// INIT
// ════════════════════════════════════════
// Check reduced motion
const prefersReduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

resizeCvs();
buildCarousel();
updatePanel();
tick();
setInterval(tick,1000);
cursorLoop();
addHoverFx();

if(!prefersReduced){
  drawFrame();
} else {
  // Static minimal version — just draw particles once
  initPtcls();
  const w=cvs.width,h=cvs.height;
  ptcls.forEach(p=>{
    const[r,g,b]=p.col;
    ctx2.beginPath();
    ctx2.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx2.fillStyle=`rgba(${r},${g},${b},${p.a})`;
    ctx2.fill();
  });
}
