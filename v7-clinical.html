<style>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const loadingEl = document.getElementById('loading');

// Initialize Sketchfab Viewer for Level 0
let sketchfabApi = null;
const sketchfabContainer = document.getElementById('sketchfab-container');
const sketchfabFrame = document.getElementById('sketchfab-frame');
const SKETCHFAB_MODEL_UID = '60ef7d2515b0403986ff9e8b7f234a66'; // Human Cell by markdragan

function initSketchfab() {
  const client = new Sketchfab('1.12.1', sketchfabFrame);
  client.init(SKETCHFAB_MODEL_UID, {
    success: function(api) {
      sketchfabApi = api;
      api.start();
      api.addEventListener('viewerready', function() {
        // Dark background matching our theme
        api.setBackground({ color: [0.024, 0.031, 0.063, 1] });
        // Hide all UI
        api.setAnnotationsVisible(false);
        // Camera auto-rotate
        api.setAutoRotate(true, { speed: 0.15 });
        // Post-processing for fluorescence look
        api.setPostProcessing({
          enable: true,
          bloomEnabled: true,
          bloomIntensity: 0.15,
          bloomThreshold: 0.8,
          vignetteEnable: false,
          toneMappingEnabled: true,
        });
        // Dismiss loading once Sketchfab is ready
        setTimeout(() => {
          loadingEl.classList.add('hidden');
          setTimeout(() => loadingEl.style.display = 'none', 1200);
        }, 500);
      });
    },
    error: function() {
      console.warn('Sketchfab failed, falling back to Three.js');
      sketchfabContainer.classList.add('hidden');
      setTimeout(() => { loadingEl.classList.add('hidden'); setTimeout(() => loadingEl.style.display = 'none', 1200); }, 1200);
    },
    ui_stop: 0,
    ui_infos: 0,
    ui_inspector: 0,
    ui_settings: 0,
    ui_watermark: 0,
    ui_annotations: 0,
    ui_color: '50dcc0',
    ui_fadeout: 0,
    transparent: 0,
    autospin: 0.15,
    autostart: 1,
    camera: 0,
    preload: 1,
    ui_hint: 0,
    ui_help: 0,
    ui_vr: 0,
    ui_fullscreen: 0,
    ui_controls: 0,
    ui_general_controls: 0,
    ui_loading: 0,
    ui_start: 0,
    ui_theme: 'dark',
    scrollwheel: 0,
    double_click: 0,
    orbit_constraint_pitch_down: 0.2,
    orbit_constraint_pitch_up: 0.2,
  });
}

window.addEventListener('load', () => {
  initSketchfab();
  // Fallback: dismiss loading after 6s regardless
  setTimeout(() => { loadingEl.classList.add('hidden'); setTimeout(() => loadingEl.style.display = 'none', 1200); }, 6000);
});

let currentLevel = 0, targetLevel = 0, isTransitioning = false, scrollAccum = 0;
const SCROLL_THRESHOLD = 140;
let mouseNX = 0, mouseNY = 0, time = 0;
const ZOOM_LABELS = ['1×','10×','100×','1000×','10000×'];
const SCALE_LABELS = ['500 µm','50 µm','5 µm','500 nm','50 nm'];
const MAG_FILLS = [5,25,50,75,100];
const LEVEL_Z = [0, -80, -200, -350, -550];

const container = document.getElementById('scene-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x060810, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 55);

scene.add(new THREE.AmbientLight(0x101828, 0.8));
const keyLight = new THREE.PointLight(0x50dcc0, 3.0, 400); keyLight.position.set(15, 25, 60); scene.add(keyLight);
const fillLight = new THREE.PointLight(0x4488ff, 1.5, 350); fillLight.position.set(-25, -15, 50); scene.add(fillLight);
const backLight = new THREE.PointLight(0xff4466, 0.8, 250); backLight.position.set(0, -20, -40); scene.add(backLight);
scene.add(new THREE.PointLight(0x50dc78, 0.4, 200).position.set(0, 40, 20) && new THREE.PointLight(0x50dc78, 0.4, 200));

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.25, 0.5, 0.3);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

function lerp(a, b, t) { return a + (b - a) * t; }
function rand(a, b) { return a + Math.random() * (b - a); }
function noise3(x, y, z) { return Math.sin(x*1.1+z*0.7)*0.5 + Math.sin(y*1.3-x*0.5)*0.3 + Math.sin(z*0.9+y*0.8)*0.2; }

function createParticleTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d'), ctr = 32;
  const g = ctx.createRadialGradient(ctr,ctr,0,ctr,ctr,ctr);
  g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.2)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
}

function generateGlowTexture(color) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d'), ctr = 128;
  const r = (color>>16)&255, g2 = (color>>8)&255, b = color&255;
  const g = ctx.createRadialGradient(ctr,ctr,0,ctr,ctr,ctr);
  g.addColorStop(0, `rgba(${r},${g2},${b},0.6)`); g.addColorStop(0.2, `rgba(${r},${g2},${b},0.3)`);
  g.addColorStop(0.5, `rgba(${r},${g2},${b},0.08)`); g.addColorStop(1, `rgba(${r},${g2},${b},0)`);
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}

function createTextSprite(text, opts = {}) {
  const c = document.createElement('canvas'); const s = 4;
  c.width = 1024*s; c.height = 256*s;
  const ctx = c.getContext('2d');
  ctx.font = `${opts.fontWeight||'300'} ${(opts.fontSize||48)*s}px 'Helvetica Neue',Arial,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (opts.shadowBlur) { ctx.shadowColor = opts.shadowColor||'rgba(80,220,192,0.2)'; ctx.shadowBlur = opts.shadowBlur*s; }
  ctx.fillStyle = opts.color||'#e0e0f0';
  ctx.fillText(text, c.width/2, c.height/2);
  const t = new THREE.CanvasTexture(c); t.minFilter = THREE.LinearFilter;
  return new THREE.Sprite(new THREE.SpriteMaterial({ map: t, transparent: true, opacity: opts.opacity||0.9, depthWrite: false }));
}

const particleTex = createParticleTexture();

const levelGroups = [];
for (let i = 0; i < 5; i++) { const g = new THREE.Group(); g.position.z = LEVEL_Z[i]; g.visible = (i===0); scene.add(g); levelGroups.push(g); }

// ═══════════════════════════════════════
// LEVEL 0: CELL (1×)
// ═══════════════════════════════════════
(function() {
  const g = levelGroups[0];

  // Cell membrane — glass-like with MeshPhysicalMaterial
  const cellGeo = new THREE.IcosahedronGeometry(18, 6);
  const pa = cellGeo.getAttribute('position');
  for (let i = 0; i < pa.count; i++) {
    const x = pa.getX(i), y = pa.getY(i), z = pa.getZ(i);
    const d = noise3(x*0.12, y*0.12, z*0.12) * 2.2;
    const len = Math.sqrt(x*x+y*y+z*z);
    const s = (18+d)/len;
    pa.setXYZ(i, x*s, y*s, z*s);
  }
  cellGeo.computeVertexNormals();

  const cellMesh = new THREE.Mesh(cellGeo, new THREE.MeshPhysicalMaterial({
    color: 0x1a6858, transparent: true, opacity: 0.12, transmission: 0.85,
    roughness: 0.15, clearcoat: 1.0, clearcoatRoughness: 0.1, ior: 1.33,
    thickness: 2.0, side: THREE.DoubleSide, envMapIntensity: 0.3
  }));
  g.add(cellMesh);

  // Very subtle wireframe
  const wireMesh = new THREE.Mesh(cellGeo.clone(), new THREE.MeshBasicMaterial({ color: 0x50dcc0, transparent: true, opacity: 0.03, wireframe: true }));
  wireMesh.scale.setScalar(1.005); g.add(wireMesh);

  // Rim glow
  g.add(new THREE.Mesh(cellGeo.clone(), new THREE.MeshBasicMaterial({ color: 0x50dcc0, transparent: true, opacity: 0.06, side: THREE.BackSide })).scale.setScalar(1.03) || g.children[g.children.length-1]);
  const rimMesh = new THREE.Mesh(cellGeo.clone(), new THREE.MeshBasicMaterial({ color: 0x50dcc0, transparent: true, opacity: 0.06, side: THREE.BackSide }));
  rimMesh.scale.setScalar(1.03); g.add(rimMesh);

  // Nucleus — DAPI blue, glowing
  const nucGeo = new THREE.IcosahedronGeometry(5.5, 5);
  const np = nucGeo.getAttribute('position');
  for (let i = 0; i < np.count; i++) {
    const x = np.getX(i), y = np.getY(i), z = np.getZ(i);
    const d = noise3(x*0.25, y*0.25, z*0.25) * 0.8;
    const len = Math.sqrt(x*x+y*y+z*z); const s = (5.5+d)/len;
    np.setXYZ(i, x*s, y*s, z*s);
  }
  nucGeo.computeVertexNormals();
  const nucMesh = new THREE.Mesh(nucGeo, new THREE.MeshPhysicalMaterial({
    color: 0x4477ee, emissive: 0x1155dd, emissiveIntensity: 0.35,
    transparent: true, opacity: 0.78, roughness: 0.35, clearcoat: 0.5, side: THREE.DoubleSide
  }));
  g.add(nucMesh);

  // Nucleus glow sprite
  const nucGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: generateGlowTexture(0x4488ff), transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending, depthWrite: false }));
  nucGlow.scale.set(14,14,1); g.add(nucGlow);

  // Nucleolus
  const nucleolus = new THREE.Mesh(new THREE.SphereGeometry(1.8,24,24), new THREE.MeshPhysicalMaterial({
    color: 0x6699ff, emissive: 0x3366cc, emissiveIntensity: 0.4, transparent: true, opacity: 0.9, roughness: 0.25
  }));
  nucleolus.position.set(0.5, 0.8, -0.3); g.add(nucleolus);

  // Chromatin
  const chromatinMeshes = [];
  const cGeo = new THREE.SphereGeometry(0.2, 8, 8);
  for (let i = 0; i < 30; i++) {
    const cm = new THREE.Mesh(cGeo, new THREE.MeshBasicMaterial({ color: 0x88bbff, transparent: true, opacity: rand(0.3,0.7) }));
    const a = rand(0,Math.PI*2), b = rand(-1,1), r = rand(1.5,4.8);
    cm.position.set(Math.cos(a)*Math.sqrt(1-b*b)*r, b*r, Math.sin(a)*Math.sqrt(1-b*b)*r);
    cm.userData = { phase: rand(0,6.28), speed: rand(0.3,1), baseR: r, a, b };
    g.add(cm); chromatinMeshes.push(cm);
  }

  // Mitochondria — Rhodamine
  const mitoMeshes = [];
  const mitoData = [
    { pos:[9,3,5], rot:[0.3,0.5,0], s:[3.8,1.3,1.3] },
    { pos:[-7,-4,-6], rot:[-0.4,1.2,0], s:[3.2,1.1,1] },
    { pos:[5,-8,3], rot:[0.8,0.3,0.5], s:[3,1.2,1.1] },
    { pos:[-10,5,-3], rot:[0.1,-0.6,0.4], s:[3.5,1.1,1.1] },
    { pos:[3,7,-8], rot:[-0.5,0.8,-0.3], s:[2.8,1,1] },
    { pos:[-4,-9,7], rot:[0.6,-0.3,0.2], s:[2.5,1,0.9] },
  ];
  mitoData.forEach(md => {
    const mm = new THREE.Mesh(new THREE.CapsuleGeometry(1,2,12,16), new THREE.MeshPhysicalMaterial({
      color: 0xdd3344, emissive: 0xbb2233, emissiveIntensity: 0.28,
      transparent: true, opacity: 0.7, roughness: 0.35, clearcoat: 0.5
    }));
    mm.position.set(...md.pos); mm.rotation.set(...md.rot); mm.scale.set(...md.s);
    g.add(mm); mitoMeshes.push(mm);
    // Cristae
    for (let c = -1; c <= 1; c++) {
      const pts = []; for (let j = 0; j <= 12; j++) pts.push(new THREE.Vector3(c*0.35, -1.5+j*0.25, Math.sin(j*0.7+c)*0.25));
      mm.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0xff6688, transparent: true, opacity: 0.15 })));
    }
    // Glow
    const gs = new THREE.Sprite(new THREE.SpriteMaterial({ map: generateGlowTexture(0xff4466), transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false }));
    gs.position.copy(mm.position); gs.scale.set(md.s[0]*4, md.s[1]*4, 1); g.add(gs);
  });

  // ER network
  for (let i = 0; i < 18; i++) {
    const pts = []; let sx = Math.cos(rand(0,Math.PI*2))*rand(7,16), sy = rand(-10,10), sz = Math.sin(rand(0,Math.PI*2))*rand(7,16);
    for (let j = 0; j <= 10; j++) { pts.push(new THREE.Vector3(sx+rand(-3,3),sy+rand(-2,2),sz+rand(-3,3))); sx+=rand(-2,2); sy+=rand(-1,1); sz+=rand(-2,2); }
    g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.CatmullRomCurve3(pts).getPoints(35)), new THREE.LineBasicMaterial({ color: 0x50dc78, transparent: true, opacity: 0.08 })));
  }

  // Vesicles
  for (let i = 0; i < 12; i++) {
    const c = [0x50dcc0,0xc4a44a,0x50dc78][Math.floor(Math.random()*3)];
    const vm = new THREE.Mesh(new THREE.SphereGeometry(rand(0.3,0.8),12,12), new THREE.MeshPhysicalMaterial({ color:c, emissive:c, emissiveIntensity: 0.18, transparent: true, opacity: rand(0.4,0.7), roughness: 0.3 }));
    const a = rand(0,Math.PI*2), r = rand(8,16);
    vm.position.set(Math.cos(a)*r, rand(-12,12), Math.sin(a)*r); g.add(vm);
  }

  // Particles — CIRCULAR
  const pCount = 400, pp = new Float32Array(pCount*3), pc = new Float32Array(pCount*3);
  const fluC = [[0.27,0.53,1],[1,0.27,0.4],[0.31,0.86,0.47],[0.31,0.86,0.75],[0.77,0.64,0.29]];
  for (let i = 0; i < pCount; i++) {
    pp[i*3]=rand(-55,55); pp[i*3+1]=rand(-40,40); pp[i*3+2]=rand(-45,45);
    const c = fluC[Math.floor(Math.random()*5)]; pc[i*3]=c[0]; pc[i*3+1]=c[1]; pc[i*3+2]=c[2];
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pp, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(pc, 3));
  const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 1.0, map: particleTex, vertexColors: true, transparent: true, opacity: 0.7,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
  }));
  g.add(particles);

  // Title — now rendered as HTML overlay (hero-title div), not Three.js sprite

  // Hide procedural cell geometry — Sketchfab viewer provides the cell model
  cellMesh.visible = false; wireMesh.visible = false; rimMesh.visible = false;
  nucMesh.visible = false; nucGlow.visible = false; nucleolus.visible = false;
  chromatinMeshes.forEach(cm => cm.visible = false);
  mitoMeshes.forEach(mm => mm.visible = false);

  g.userData = { cellMesh, wireMesh, nucMesh, nucleolus, particles, nucGlow, chromatinMeshes, mitoMeshes };
})();

function buildDeep(idx, label, nodes, pColor) {
  const g = levelGroups[idx];
  g.add(new THREE.Mesh(new THREE.IcosahedronGeometry(8,4), new THREE.MeshPhysicalMaterial({ color:pColor, emissive:pColor, emissiveIntensity:0.3, transparent:true, opacity:0.4, roughness:0.3, clearcoat:0.5 })));

  gs.scale.set(40,40,1); g.add(gs);
  const sp = createTextSprite(label, { fontSize:36, fontWeight:'300', opacity:0.8 });
  sp.position.set(0,14,5); sp.scale.set(30,6,1); g.add(sp);

  nodes.forEach((d,i) => {
    const angle = (i/nodes.length)*Math.PI*2, r = 18;
    const nm = new THREE.Mesh(new THREE.SphereGeometry(2,16,16), new THREE.MeshPhysicalMaterial({ color:d.color, emissive:d.color, emissiveIntensity:0.4, transparent:true, opacity:0.6, roughness:0.3 }));
    nm.position.set(Math.cos(angle)*r, Math.sin(angle)*r, 0); nm.userData = { detail:d.detail, id:d.id }; g.add(nm);
    const ls = createTextSprite(d.label, { fontSize:16, color:'#'+d.color.toString(16).padStart(6,'0'), fontWeight:'500', opacity:0.7 });
    ls.position.set(Math.cos(angle)*r, Math.sin(angle)*r-4, 0); ls.scale.set(10,2,1); g.add(ls);
  });

  const pc3=150, pp3=new Float32Array(pc3*3);
  for(let i=0;i<pc3;i++){pp3[i*3]=rand(-35,35);pp3[i*3+1]=rand(-25,25);pp3[i*3+2]=rand(-25,25);}
  const pg3=new THREE.BufferGeometry(); pg3.setAttribute('position',new THREE.BufferAttribute(pp3,3));
  g.add(new THREE.Points(pg3, new THREE.PointsMaterial({ size:0.6, color:pColor, map:particleTex, transparent:true, opacity:0.4, blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true })));
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  mouseNX = (e.clientX/window.innerWidth)*2-1;
  mouseNY = -(e.clientY/window.innerHeight)*2+1;
  cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px';
});

function transitionToLevel(n) {
  if(n<0||n>4||n===currentLevel||isTransitioning)return;
  isTransitioning=true; targetLevel=n;
  const flash=document.getElementById('transition-flash'); flash.classList.add('flash'); setTimeout(()=>flash.classList.remove('flash'),200);
  levelGroups[n].visible=true;
  // Show/hide Sketchfab viewer + hero title
  const heroTitle = document.getElementById('hero-title');
  if(n===0) { sketchfabContainer.classList.remove('hidden'); heroTitle.style.opacity='1'; if(sketchfabApi) sketchfabApi.setAutoRotate(true, {speed:0.15}); }
  else { sketchfabContainer.classList.add('hidden'); heroTitle.style.opacity='0'; if(sketchfabApi) sketchfabApi.setAutoRotate(false); }
  const startZ=camera.position.z, endZ=LEVEL_Z[n]+55, dur=1200, start=performance.now();
  (function anim(now){
    const t=Math.min((now-start)/dur,1), e=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    camera.position.z=lerp(startZ,endZ,e);
    if(t<1)requestAnimationFrame(anim);
    else{if(currentLevel!==n)levelGroups[currentLevel].visible=false;currentLevel=n;isTransitioning=false;updateUI();}
  })(performance.now());
  updateUI();
}

function updateUI() {
  const l=isTransitioning?targetLevel:currentLevel;
  document.getElementById('mag-value').textContent=ZOOM_LABELS[l];
  document.getElementById('scale-text').textContent=SCALE_LABELS[l];
  document.getElementById('mag-bar-fill').style.width=MAG_FILLS[l]+'%';
  document.querySelectorAll('.zoom-dot').forEach((d,i)=>d.classList.toggle('active',i===l));
  document.getElementById('nav-hint').textContent=l===0?'SCROLL TO ENTER THE CELL':l===4?'MAXIMUM MAGNIFICATION':'SCROLL TO ZOOM DEEPER';
}

window.addEventListener('wheel',e=>{e.preventDefault();scrollAccum+=e.deltaY;if(Math.abs(scrollAccum)>SCROLL_THRESHOLD){transitionToLevel(currentLevel+(scrollAccum>0?1:-1));scrollAccum=0;}},{passive:false});
let touchY=0;
window.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;});
window.addEventListener('touchend',e=>{const dy=touchY-e.changedTouches[0].clientY;if(Math.abs(dy)>50)transitionToLevel(currentLevel+(dy>0?1:-1));});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight')transitionToLevel(currentLevel+1);
  if(e.key==='ArrowUp'||e.key==='ArrowLeft')transitionToLevel(currentLevel-1);
  if(e.key>='1'&&e.key<='5')transitionToLevel(parseInt(e.key)-1);
  if(e.key==='Escape')closeDetail();
});
document.querySelectorAll('.zoom-dot').forEach(d=>d.addEventListener('click',()=>transitionToLevel(parseInt(d.dataset.level))));

const detailPanel=document.getElementById('detail-panel');
function openDetail(d){document.getElementById('detail-title').textContent=d.title;document.getElementById('detail-subtitle').textContent=d.subtitle;document.getElementById('detail-body').innerHTML=d.body;detailPanel.classList.add('open');}
function closeDetail(){detailPanel.classList.remove('open');}
document.getElementById('detail-panel-close').addEventListener('click',closeDetail);

const raycaster=new THREE.Raycaster(), pointer=new THREE.Vector2();
renderer.domElement.addEventListener('click',e=>{
  pointer.x=(e.clientX/window.innerWidth)*2-1; pointer.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const meshes=levelGroups[currentLevel].children.filter(c=>c.isMesh&&c.userData.detail);
  const hits=raycaster.intersectObjects(meshes);
  if(hits.length>0)openDetail(hits[0].object.userData.detail);
});

document.getElementById('illum-slider').addEventListener('input',e=>{
  const f=parseFloat(e.target.value)/100;
  keyLight.intensity=2*f; fillLight.intensity=1*f; bloomPass.strength=0.25*f;
});

document.getElementById('screenshot-btn').addEventListener('click',()=>{
  composer.render();
  const a=document.createElement('a'); a.download='raul-zhou-specimen.png'; a.href=renderer.domElement.toDataURL('image/png'); a.click();
});

// ═══════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  const l0 = levelGroups[0].userData;
  if (levelGroups[0].visible && l0.cellMesh) {
    const b = 1+Math.sin(time*0.5)*0.008;
    l0.cellMesh.scale.setScalar(b); l0.wireMesh.scale.setScalar(b*1.005);
    const np = 1+Math.sin(time*0.8)*0.015;
    l0.nucMesh.scale.setScalar(np);
    l0.nucGlow.material.opacity = 0.4+Math.sin(time*0.6)*0.1;
    l0.nucleolus.rotation.y = time*0.2;
    l0.chromatinMeshes.forEach(cm=>{
      const u=cm.userData, t2=time*u.speed+u.phase, r=u.baseR+Math.sin(t2)*0.3;
      cm.position.x=Math.cos(u.a+t2*0.05)*Math.sqrt(1-u.b*u.b)*r;
      cm.position.z=Math.sin(u.a+t2*0.05)*Math.sqrt(1-u.b*u.b)*r;
    });
    l0.mitoMeshes.forEach((mm,i)=>{mm.rotation.x+=0.001;mm.rotation.z+=0.0005;mm.position.y+=Math.sin(time*0.3+i)*0.003;});
    const pa=l0.particles.geometry.getAttribute('position');
    for(let i=0;i<pa.count;i++){pa.setY(i,pa.getY(i)+Math.sin(time*0.2+i*0.1)*0.005);pa.setX(i,pa.getX(i)+Math.cos(time*0.15+i*0.07)*0.003);}
    pa.needsUpdate=true;
  }
  if(!isTransitioning){
    camera.position.x=lerp(camera.position.x,mouseNX*3,0.02);
    camera.position.y=lerp(camera.position.y,mouseNY*2,0.02);
    camera.lookAt(0,0,LEVEL_Z[currentLevel]);
  }
  const l1=levelGroups[1].userData;
  if(levelGroups[1].visible&&l1.organelleMeshes){l1.organelleMeshes.forEach((m,i)=>{m.rotation.y+=0.003;m.position.y+=Math.sin(time*0.4+i*1.5)*0.005;});}
  composer.render();
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth, h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h); bloomPass.resolution.set(w,h);
});
